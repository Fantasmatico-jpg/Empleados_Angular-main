<div class="row">

  
  <div class="col-md-4">
    <div class="card">
      <div class="card-body">
        <h4>Formulario</h4>
      </div>
    </div>
  </div>

  
  <div class="col-md-8">
    <table class="table table-striped">

      <thead>
        <tr>
          <th>Nombre</th>
          <th>Oficina</th>
          <th>Cargo</th>
          <th>Salario</th>
          <th>Acciones</th> 
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let emp of employees">
          <td>{{ emp.name }}</td>
          <td>{{ emp.office }}</td>
          <td>{{ emp.position }}</td>
          <td>{{ emp.salary }}</td>

          
          <td>
            <button class="btn btn-primary btn-sm">EDITAR</button>
            <button class="btn btn-danger btn-sm">ELIMINAR</button>
          </td>
        </tr>
      </tbody>

    </table>
  </div>

</div>
